name: Document360 API Documentation Tests
on:
  push:
    branches: [ main, master, feature/* ]
  pull_request:
    branches: [ main, master ]
  schedule:
    # Run tests daily at 6 AM UTC
    - cron: '0 6 * * *'

permissions: write-all

env:
  NODE_ENV: qa

jobs:
  test:
    timeout-minutes: 90
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [chromium, firefox, webkit]
      fail-fast: false
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}
        
      - name: Setup environment variables
        env:
          QA_USERNAME: ${{ secrets.QA_USERNAME }}
          QA_PASSWORD: ${{ secrets.QA_PASSWORD }}
        run: |
          echo "QA_APP_URL=https://portal.document360.io/" >> $GITHUB_ENV
          echo "NODE_ENV=qa" >> $GITHUB_ENV
          # Verify required secrets are available
          if [ -z "$QA_USERNAME" ] || [ -z "$QA_PASSWORD" ]; then
            echo "❌ Required secrets QA_USERNAME or QA_PASSWORD are not set"
            echo "Please check repository secrets configuration"
            exit 1
          fi
          
      - name: Run Document360 Authentication Tests
        run: npx playwright test tests/uiTests/e2e/Document360AuthenticationTest.spec.ts --project=${{ matrix.browser }}
        continue-on-error: true
        
      - name: Run API Documentation Tests (if auth passes)
        if: success()
        run: npx playwright test tests/uiTests/e2e/ --grep "API Documentation" --project=${{ matrix.browser }}
        continue-on-error: true
        
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.browser }}
          path: test-results/
          retention-days: 30
          
      - name: Upload enhanced reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: enhanced-reports-${{ matrix.browser }}
          path: test-results/reports/
          retention-days: 30

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Download enhanced reports
        uses: actions/download-artifact@v4
        with:
          pattern: enhanced-reports-*
          path: reports-to-deploy/
          merge-multiple: true
          
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./reports-to-deploy
          destination_dir: test-reports
          
  notification:
    if: always()
    needs: [test, deploy]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Download enhanced reports for notification
        uses: actions/download-artifact@v4
        with:
          pattern: enhanced-reports-*
          path: notification-reports/
          merge-multiple: true
          
      - name: Send email notification with enhanced report
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "🎭 Document360 Test Results - ${{ job.status }}"
          to: ${{ secrets.EMAIL_RECIPIENTS }}
          from: "Document360 Automation <${{ secrets.EMAIL_USERNAME }}>"
          body: |
            🎭 Document360 API Documentation Test Results
            
            Status: ${{ job.status }}
            Environment: QA
            Browsers: Chromium, Firefox, WebKit
            Triggered by: ${{ github.actor }}
            Branch: ${{ github.ref_name }}
            
            📋 Enhanced Test Report is attached to this email.
            🔗 View online: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/test-reports/
            � Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          attachments: notification-reports/enhanced-report.html
            
      - name: Create test summary
        run: |
          echo "## 🎭 Document360 API Documentation Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Environment: QA" >> $GITHUB_STEP_SUMMARY
          echo "- **Target Application**: Document360 Portal" >> $GITHUB_STEP_SUMMARY
          echo "- **Test Suite**: API Documentation Module" >> $GITHUB_STEP_SUMMARY
          echo "- **Browsers**: Chromium, Firefox, WebKit" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered By**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### � Enhanced Reports" >> $GITHUB_STEP_SUMMARY
          echo "Check the artifacts above for detailed test results and enhanced HTML reports." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔗 Links" >> $GITHUB_STEP_SUMMARY
          echo "- [📋 Enhanced Test Reports](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/test-reports/)" >> $GITHUB_STEP_SUMMARY
          echo "- [🔧 Workflow Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
