name: EY Automation Framework Tests

on:
  push:
    branches: [main, master, develop, compliance-manager]
  pull_request:
    branches: [main, master, develop]
  
  # Manual trigger with options
  workflow_dispatch:
    inputs:
      environment:
        description: 'Test environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - qa
          - staging
          - prod
      test-suite:
        description: 'Test suite to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - smoke
          - regression
          - ui
          - api
      browser:
        description: 'Browser to test'
        required: false
        default: 'chromium'
        type: choice
        options:
          - chromium
          - firefox
          - webkit
          - all

  # Schedule for nightly regression tests
  schedule:
    - cron: '0 2 * * *'  # Run at 2 AM UTC daily

permissions: 
  contents: read
  pages: write
  id-token: write
  actions: read
  checks: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20.x'
  NODE_ENV: ${{ github.event.inputs.environment || 'dev' }}
  TEST_SUITE: ${{ github.event.inputs.test-suite || 'all' }}

jobs:
  # ============================================
  # Smoke Tests (Fast - Run First)
  # ============================================
  smoke-tests:
    name: Smoke Tests (${{ matrix.browser }})
    runs-on: ubuntu-22.04
    if: |
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.test-suite == 'all' || github.event.inputs.test-suite == 'smoke'))
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cache Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Install Playwright Dependencies (if cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps ${{ matrix.browser }}

      - name: Run Smoke Tests
        env:
          CI: true
        run: npm run test:smoke -- --project=${{ matrix.browser }}
        continue-on-error: false

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-results-${{ matrix.browser }}
          path: |
            test-results/
            playwright-report/
          retention-days: 7

  # ============================================
  # UI E2E Tests (Parallel Execution)
  # ============================================
  ui-tests:
    name: UI Tests (${{ matrix.browser }} - Shard ${{ matrix.shard }})
    runs-on: ubuntu-22.04
    needs: [smoke-tests]
    if: |
      always() && needs.smoke-tests.result != 'failure' && (
        github.event_name == 'schedule' ||
        (github.event_name == 'workflow_dispatch' && (github.event.inputs.test-suite == 'all' || github.event.inputs.test-suite == 'ui'))
      )
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox]
        shard: [1, 2]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run UI Tests
        env:
          CI: true
        run: npm run test:ui -- --project=${{ matrix.browser }} --shard=${{ matrix.shard }}/2
        continue-on-error: true

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-results-${{ matrix.browser }}-shard-${{ matrix.shard }}
          path: |
            test-results/
            playwright-report/
          retention-days: 14

      - name: Upload Trace on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ui-traces-${{ matrix.browser }}-shard-${{ matrix.shard }}
          path: test-results/**/trace.zip
          retention-days: 7

  # ============================================
  # API Tests (Fast - Can Run in Parallel)
  # ============================================
  api-tests:
    name: API Integration Tests
    runs-on: ubuntu-22.04
    if: |
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.test-suite == 'all' || github.event.inputs.test-suite == 'api'))
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Run API Tests
        id: api-tests
        env:
          CI: true
        run: npm run test:api
        continue-on-error: true

      - name: Parse Test Results
        id: test-results
        if: always()
        run: |
          ENV="${{ env.NODE_ENV }}"
          JSON_FILE="test-results/${ENV}/test-results.json"
          
          echo "Looking for: $JSON_FILE"
          ls -la test-results/ 2>/dev/null || true
          ls -la test-results/${ENV}/ 2>/dev/null || true
          
          if [ -f "$JSON_FILE" ]; then
            echo "Found JSON file, parsing..."
            PASSED=$(jq '.stats.expected // 0' "$JSON_FILE")
            FAILED=$(jq '.stats.unexpected // 0' "$JSON_FILE")
            SKIPPED=$(jq '.stats.skipped // 0' "$JSON_FILE")
            TOTAL=$((PASSED + FAILED + SKIPPED))
          else
            echo "JSON file not found, using defaults"
            TOTAL=0; PASSED=0; FAILED=0; SKIPPED=0
          fi
          
          echo "Results: Total=$TOTAL, Passed=$PASSED, Failed=$FAILED, Skipped=$SKIPPED"
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "skipped=$SKIPPED" >> $GITHUB_OUTPUT
          
          # Create summary
          echo "## 📊 API Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Total Tests | $TOTAL |" >> $GITHUB_STEP_SUMMARY
          echo "| ✅ Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
          echo "| ❌ Failed | $FAILED |" >> $GITHUB_STEP_SUMMARY
          echo "| ⏭️ Skipped | $SKIPPED |" >> $GITHUB_STEP_SUMMARY
          if [ "$TOTAL" -gt 0 ]; then
            PASS_RATE=$((PASSED * 100 / TOTAL))
            echo "| 📈 Pass Rate | ${PASS_RATE}% |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: List Failed Tests
        if: always()
        run: |
          ENV="${{ env.NODE_ENV }}"
          JSON_FILE="test-results/${ENV}/test-results.json"
          
          if [ -f "$JSON_FILE" ]; then
            FAILED_TESTS=$(jq -r '.suites[].specs[] | select(.tests[].status == "unexpected") | "- ❌ \(.title)"' "$JSON_FILE" 2>/dev/null | head -20)
            if [ -n "$FAILED_TESTS" ]; then
              echo "### Failed Tests:" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              echo "$FAILED_TESTS" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
            fi
          fi

      - name: Upload API Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-results
          path: |
            test-results/
            playwright-report/
          retention-days: 14

  # ============================================
  # Regression Tests (Full Suite - Nightly)
  # ============================================
  regression-tests:
    name: Regression Tests
    runs-on: ubuntu-22.04
    if: github.event_name == 'schedule' || github.event.inputs.test-suite == 'regression'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Regression Tests
        env:
          CI: true
        run: npm run test:regression
        continue-on-error: true

      - name: Upload Regression Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-test-results
          path: |
            test-results/
            playwright-report/
          retention-days: 30

  # ============================================
  # Generate & Deploy Test Report
  # ============================================
  generate-report:
    name: Generate Test Report
    runs-on: ubuntu-22.04
    needs: [smoke-tests, api-tests]
    if: always()
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download All Test Results
        uses: actions/download-artifact@v4
        with:
          path: all-test-results

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Merge Test Reports
        run: |
          mkdir -p merged-report
          echo "Searching for reports in all-test-results..."
          
          # List all artifact contents
          find all-test-results -type f -name "*.html" 2>/dev/null || true
          
          # Copy playwright-report (standard HTML report)
          for dir in $(find all-test-results -type d -name "playwright-report" 2>/dev/null); do
            echo "Found playwright-report: $dir"
            cp -r "$dir"/* merged-report/ 2>/dev/null || true
          done
          
          # Copy enhanced-report folder contents
          for dir in $(find all-test-results -type d -name "enhanced-report" 2>/dev/null); do
            echo "Found enhanced-report: $dir"
            cp -r "$dir"/* merged-report/ 2>/dev/null || true
          done
          
          # Copy any standalone HTML reports
          find all-test-results -type f -name "enhanced-report.html" -exec cp {} merged-report/ \; 2>/dev/null || true
          find all-test-results -type f -name "*.html" -exec cp {} merged-report/ \; 2>/dev/null || true
          
          echo "Merged report contents:"
          ls -la merged-report/ || echo "No reports found"
        continue-on-error: true

      - name: Upload Merged Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: merged-test-report
          path: merged-report/
          retention-days: 30
          if-no-files-found: ignore

      - name: Setup Pages
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/compliance-manager'
        uses: actions/configure-pages@v4
        continue-on-error: true

      - name: Upload to GitHub Pages
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/compliance-manager'
        uses: actions/upload-pages-artifact@v3
        with:
          path: merged-report/
        continue-on-error: true

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/compliance-manager'
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

  # ============================================
  # Test Summary
  # ============================================
  test-summary:
    name: Test Summary
    runs-on: ubuntu-22.04
    needs: [smoke-tests, api-tests]
    if: always()
    steps:
      - name: Generate Summary
        run: |
          echo "## 🧪 EY Automation Framework Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Execution Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Smoke Tests | ${{ needs.smoke-tests.result == 'success' && '✅ Passed' || needs.smoke-tests.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| API Tests | ${{ needs.api-tests.result == 'success' && '✅ Passed' || needs.api-tests.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ github.event.inputs.environment || 'dev' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Test Suite:** ${{ github.event.inputs.test-suite || 'all' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Run ID:** ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📄 Test Reports" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **[Download Artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})** (from workflow run)" >> $GITHUB_STEP_SUMMARY

  # ============================================
  # PR Comment with Results
  # ============================================
  pr-comment:
    name: Comment on PR
    runs-on: ubuntu-22.04
    needs: [smoke-tests, api-tests]
    if: github.event_name == 'pull_request' && always()
    steps:
      - name: Download Test Results
        uses: actions/download-artifact@v4
        with:
          path: all-test-results
        continue-on-error: true

      - name: Comment PR with Test Results
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            let passed = 0, failed = 0, skipped = 0;
            
            // Try to find and parse test results
            const findResults = (dir) => {
              try {
                const files = fs.readdirSync(dir, { withFileTypes: true });
                for (const file of files) {
                  const path = `${dir}/${file.name}`;
                  if (file.isDirectory()) {
                    findResults(path);
                  } else if (file.name === 'test-results.json') {
                    const data = JSON.parse(fs.readFileSync(path, 'utf8'));
                    passed += data.stats?.expected || 0;
                    failed += data.stats?.unexpected || 0;
                    skipped += data.stats?.skipped || 0;
                  }
                }
              } catch (e) {}
            };
            
            findResults('all-test-results');
            
            const total = passed + failed + skipped;
            const passRate = total > 0 ? Math.round((passed / total) * 100) : 0;
            
            const body = `## 🎭 Playwright Test Results
            
            **Environment:** ${{ github.event.inputs.environment || 'dev' }}
            **Test Suite:** ${{ github.event.inputs.test-suite || 'all' }}
            
            | Status | Count |
            |--------|-------|
            | ✅ Passed | ${passed} |
            | ❌ Failed | ${failed} |
            | ⏭️ Skipped | ${skipped} |
            | 📈 Pass Rate | ${passRate}% |
            
            [📊 View Full Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  # ============================================
  # Notifications
  # ============================================
  notify:
    name: Send Notifications
    runs-on: ubuntu-22.04
    needs: [smoke-tests, api-tests]
    if: always()
    steps:
      - name: Notify on Success
        if: needs.smoke-tests.result == 'success' && needs.api-tests.result == 'success'
        run: |
          echo "✅ All critical tests passed!"
          # Add Slack/Teams notification here if needed

      - name: Notify on Failure
        if: needs.smoke-tests.result == 'failure' || needs.api-tests.result == 'failure'
        run: |
          echo "❌ Some tests failed! Check report for details."
          # Add Slack/Teams notification here if needed
